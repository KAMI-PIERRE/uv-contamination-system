version: "3.9"

# ═══════════════════════════════════════════════════════════════
# docker-compose.yml — UV Contamination Detection System
# Usage:
#   docker compose up --build        ← build and start
#   docker compose up -d             ← start in background
#   docker compose down              ← stop and remove containers
#   docker compose logs -f           ← follow logs
# ═══════════════════════════════════════════════════════════════

services:

  # ── Flask / Gunicorn application ─────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uv_detection_app
    restart: unless-stopped

    ports:
      - "5000:5000"      # Access at http://localhost:5000

    # Load environment variables from .env file
    env_file:
      - .env

    # Override specific env vars for container environment
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=False
      - APP_HOST=0.0.0.0
      - APP_PORT=5000

    # Persist trained ML models across container restarts
    volumes:
      - ml_models:/app/models

    # Health check — Docker restarts container if unhealthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # Resource limits (comfortable for free-tier VPS)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

# ── Named volumes ─────────────────────────────────────────────
volumes:
  ml_models:
    driver: local
