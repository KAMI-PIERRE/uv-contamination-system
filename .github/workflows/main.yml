# ═══════════════════════════════════════════════════════════════
# GitHub Actions Workflow
# UV Surface Contamination Detection System
#
# Repository root is uv_system/ — all paths are relative to it.
#
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME  — your Docker Hub username
#   DOCKERHUB_TOKEN     — your Docker Hub personal access token
# ═══════════════════════════════════════════════════════════════

name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/uv-contamination-system

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Python syntax check
  # ─────────────────────────────────────────────────────────────
  test:
    name: Python Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # requirements.txt is at the repo root (uv_system/)
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check all Python source files
        run: |
          python -m py_compile app.py
          python -m py_compile config.py
          python -m py_compile database.py
          python -m py_compile models.py
          python -m py_compile ml/__init__.py
          python -m py_compile ml/dataset.py
          python -m py_compile ml/train.py
          python -m py_compile ml/predict.py
          python -m py_compile routes/__init__.py
          python -m py_compile routes/api.py
          python -m py_compile routes/dashboard.py
          echo "All Python files passed syntax check."

      - name: Verify app factory loads and all routes register
        run: |
          DATABASE_URL=sqlite:///test.db python - <<'EOF'
          from app import create_app
          app = create_app()
          rules = [str(r) for r in app.url_map.iter_rules()]
          print(f"Routes registered: {len(rules)}")
          for r in sorted(rules):
              print(f"  {r}")
          assert len(rules) >= 18, f"Expected 18+ routes, got {len(rules)}"
          print("App factory OK")
          EOF

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Build and push Docker image to Docker Hub
  # Only runs on push to main, not on pull requests
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Generate image tags and OCI labels
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      # Enable multi-architecture builds (amd64 + arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate with Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build image and push — Dockerfile is at repo root (uv_system/)
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print build summary
        run: |
          echo "✅ Docker image pushed successfully!"
          echo "   Image  : ${{ env.IMAGE_NAME }}"
          echo "   Tags   : ${{ steps.meta.outputs.tags }}"
          echo "   Digest : ${{ steps.build.outputs.digest }}"

      # Update Docker Hub repository description from README
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        continue-on-error: true        # Don't fail the build if this step errors
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/uv-contamination-system
          short-description: "ML-based UV Surface Contamination Detection System"
          readme-filepath: ./README.md
