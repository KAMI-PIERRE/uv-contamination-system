
name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:    # Allow manual trigger from GitHub Actions tab

env:
  # Change this to your Docker Hub username/repo-name
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/uv-contamination-system

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Python syntax check
  # Fast validation before spending time on Docker build
  # ─────────────────────────────────────────────────────────────
  test:
    name: Python Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: uv_system/requirements.txt

      - name: Install dependencies
        run: |
          cd uv_system
          pip install -r requirements.txt

      - name: Check Python syntax on all source files
        run: |
          cd uv_system
          python -m py_compile app.py
          python -m py_compile config.py
          python -m py_compile database.py
          python -m py_compile models.py
          python -m py_compile ml/__init__.py
          python -m py_compile ml/dataset.py
          python -m py_compile ml/train.py
          python -m py_compile ml/predict.py
          python -m py_compile routes/__init__.py
          python -m py_compile routes/api.py
          python -m py_compile routes/dashboard.py
          echo "All Python files passed syntax check."

      - name: Verify app factory loads
        run: |
          cd uv_system
          DATABASE_URL=sqlite:///test.db python -c "
          from app import create_app
          app = create_app()
          rules = [str(r) for r in app.url_map.iter_rules()]
          print(f'Routes registered: {len(rules)}')
          assert len(rules) >= 18, f'Expected 18+ routes, got {len(rules)}'
          print('App factory OK')
          "

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Build Docker image and push to Docker Hub
  # Only runs on push to main (not on pull requests)
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test          # Only build if syntax check passes
    if: github.event_name != 'pull_request'   # Don't push on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Docker metadata — generates tags and labels ────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Tag with git short SHA: uv-system:abc1234
            type=sha,prefix=,suffix=,format=short
            # Tag latest on every main push
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with branch name: uv-system:main
            type=ref,event=branch

      # ── Set up QEMU for multi-platform builds ──────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── Set up Docker Buildx ───────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to Docker Hub ────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build and push multi-platform image ───────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./uv_system       # Dockerfile is inside uv_system/
          file: ./uv_system/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64   # amd64 for servers, arm64 for Raspberry Pi
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between builds for faster subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Print image digest ─────────────────────────────────────
      - name: Print image digest
        run: |
          echo "Image pushed successfully!"
          echo "Image: ${{ env.IMAGE_NAME }}"
          echo "Tags : ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

      # ── Update Docker Hub description ─────────────────────────
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/uv-contamination-system
          short-description: "ML-based UV Surface Contamination Detection System"
          readme-filepath: ./uv_system/README.md
